<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sparshub EDU-ERP v2.1 TEACHER OS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--accent:#16a34a}
.light{--bg:#f8fafc;--card:#ffffff;--border:#e2e8f0;--accent:#15803d}
body{font-family:'Inter',sans-serif;background:var(--bg);color:#e2e8f0;transition:.3s}
.light body{color:#0f172a}
.card{background:var(--card);border:1px solid var(--border)}
.btn{background:var(--accent);color:#000;font-weight:800}
.btn-red{background:#dc2626;color:#fff}.btn-blue{background:#2563eb;color:#fff}
.tab-active{border-bottom:3px solid var(--accent);color:var(--accent)}
.hidden{display:none}.locked{background:#450a0a}
.at-risk{color:#f87171;font-weight:800}
.present{background:#16a34a;color:#000}.absent{background:#dc2626;color:#fff}.late{background:#f59e0b;color:#000}
</style>
</head>
<body class="min-h-screen">
<div id="app" class="max-w-7xl mx-auto p-4">

  <!-- LOGIN -->
  <div id="loginScreen" class="flex items-center justify-center min-h-[80vh]">
    <div class="card p-8 rounded-2xl w-full max-w-md">
      <h2 class="text-3xl font-800 text-center text-[#16a34a] mb-2">SPARSHUB v2.1</h2>
      <p class="text-center text-sm text-slate-400 mb-6">TEACHER COMMAND CENTER</p>
      <input id="emisCode" type="text" placeholder="EMIS: 909101234" class="w-full bg-slate-800 light:bg-slate-100 p-3 rounded-lg mb-3">
      <select id="roleSelect" class="w-full bg-slate-800 light:bg-slate-100 p-3 rounded-lg mb-3" onchange="toggleRoleFields()">
        <option value="admin">PRINCIPAL</option><option value="finance">FINANCE</option><option value="teacher">TEACHER</option><option value="parent">PARENT</option>
      </select>
      <input id="teacherCode" type="text" placeholder="T-MATH001" class="w-full bg-slate-800 light:bg-slate-100 p-3 rounded-lg mb-3 hidden">
      <input id="parentCode" type="text" placeholder="P-THABO2026" class="w-full bg-slate-800 light:bg-slate-100 p-3 rounded-lg mb-4 hidden">
      <button onclick="login()" class="btn w-full p-3 rounded-lg">LOGIN</button>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="mainApp" class="hidden">
    <header class="flex justify-between items-center mb-6">
      <div><h2 class="text-2xl font-800 text-[#16a34a]">SPARSHUB <span id="emisBadge" class="text-sm bg-blue-600 px-2 py-1 rounded"></span></h2><p id="userRole" class="text-sm text-slate-400"></p></div>
      <button onclick="logout()" class="btn-red px-4 py-2 rounded-lg text-sm">LOGOUT</button>
    </header>

    <!-- TABS -->
    <div id="tabs" class="flex gap-4 border-b border-slate-700 mb-6 overflow-x-auto pb-2">
      <button class="tab-btn tab-active pb-2" onclick="showTab('dashboard')">📊 DASHBOARD</button>
      <button class="tab-btn pb-2 admin-only" onclick="showTab('students')">🎓 STUDENTS</button>
      <button class="tab-btn pb-2 admin-only" onclick="showTab('staff')">👨‍🏫 STAFF</button>
      <button class="tab-btn pb-2 teacher-only" onclick="showTab('myclasses')">🏫 MY CLASSES</button> <!-- NEW -->
      <button class="tab-btn pb-2 teacher-only" onclick="showTab('upload')">📁 UPLOAD</button>
      <button class="tab-btn pb-2 admin-only teacher-only" onclick="showTab('tasks')">✅ TASKS</button>
      <button class="tab-btn pb-2 admin-only teacher-only" onclick="showTab('marks')">📈 MARKS</button>
      <button class="tab-btn pb-2 admin-only finance-only" onclick="showTab('fees')">💰 FEES</button>
      <button class="tab-btn pb-2 admin-only" onclick="showTab('export')">📤 EXPORT</button>
      <button class="tab-btn pb-2 admin-only" onclick="showTab('audit')">📜 AUDIT</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab-content"></div>

    <!-- MY CLASSES = GOD TIER TEACHER TAB -->
    <div id="myclasses" class="tab-content hidden">
      <div class="card p-6 rounded-xl mb-4">
        <div class="flex flex-wrap gap-3 mb-4">
          <select id="classFilter" onchange="renderMyClass()" class="bg-slate-800 light:bg-slate-100 p-3 rounded-lg"></select>
          <button onclick="toggleAttendanceMode()" class="btn-blue px-4 py-2 rounded-lg">📋 ATTENDANCE</button>
          <button onclick="saveAllMarks()" class="btn px-4 py-2 rounded-lg">💾 SAVE ALL MARKS</button>
        </div>
        <div id="classStats" class="grid md:grid-cols-4 gap-3 mb-4"></div>
      </div>
      <div class="card p-6 rounded-xl overflow-x-auto">
        <table class="w-full text-sm" id="classTable"></table>
      </div>
    </div>

    <!-- OTHER TABS OMITTED FOR SPACE... SAME AS BEFORE -->
    <div id="students" class="tab-content hidden"></div>
    <div id="staff" class="tab-content hidden"></div>
    <div id="upload" class="tab-content hidden"></div>
    <div id="tasks" class="tab-content hidden"></div>
    <div id="marks" class="tab-content hidden"></div>
    <div id="fees" class="tab-content hidden"></div>
    <div id="export" class="tab-content hidden"></div>
    <div id="audit" class="tab-content hidden"></div>
    <div id="parentView" class="hidden"></div>
  </div>
</div>
<script>
let DB=JSON.parse(localStorage.getItem('sparshubDB'))||{emis:'',nscLocked:false,teachers:[{code:'T-MATH001',name:'Mr Mokoena',role:'teacher',dept:'Mathematics',subjects:[{grade:'10A',subject:'Mathematics'}],active:true}],learners:[{id:'L001',name:'Thabo Mokoena',grade:'10A',parentCode:'P-THABO2026',idno:'0601015000087'},{id:'L002',name:'Lerato Khumalo',grade:'10A',parentCode:'P-LERATO',idno:'0702025000088'},{id:'L003',name:'Siya Ndlovu',grade:'10A',parentCode:'P-SIYA',idno:'0703035000089'}],learnersG12:[],fees:[],marks:[],attendance:{},uploads:[],tasks:[],audit:[]};
let CURRENT_ROLE='',CURRENT_TEACHER='',ATTENDANCE_MODE=false;

function saveDB(){localStorage.setItem('sparshubDB',JSON.stringify(DB));}
function toggleRoleFields(){const r=document.getElementById('roleSelect').value;document.getElementById('teacherCode').classList.toggle('hidden',r!=='teacher');document.getElementById('parentCode').classList.toggle('hidden',r!=='parent');}

function login(){
  const emis=document.getElementById('emisCode').value.trim();const role=document.getElementById('roleSelect').value;const tCode=document.getElementById('teacherCode').value.trim();
  if(!/^[0-9]{9}$/.test(emis))return alert('EMIS: 9 digits');if(role==='teacher'&&!tCode)return alert('Teacher Code?');
  DB.emis=emis;CURRENT_ROLE=role;CURRENT_TEACHER=tCode;
  const t=DB.teachers.find(x=>x.code===tCode);if(role==='teacher'&&(!t||!t.active))return alert('Invalid Teacher');
  document.getElementById('loginScreen').classList.add('hidden');document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('emisBadge').innerText='EMIS:'+emis;document.getElementById('userRole').innerText=`${t.name} | ${t.dept}`;
  if(role==='teacher'){document.querySelectorAll('.admin-only').forEach(el=>el.classList.add('hidden'));renderTeacherDashboard();}
  renderAll();applyPermissions();
}
function logout(){location.reload();}
function applyPermissions(){document.querySelectorAll('.admin-only').forEach(el=>el.classList.toggle('hidden',CURRENT_ROLE!=='admin'));document.querySelectorAll('.teacher-only').forEach(el=>el.classList.toggle('hidden',!['admin','teacher'].includes(CURRENT_ROLE)));}
function showTab(id){document.querySelectorAll('.tab-content').forEach(t=>t.classList.add('hidden'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('tab-active'));document.getElementById(id).classList.remove('hidden');event.target.classList.add('tab-active');if(id==='myclasses')renderMyClass();}

function renderTeacherDashboard(){
  const t=DB.teachers.find(x=>x.code===CURRENT_TEACHER);
  document.getElementById('dashboard').innerHTML=`
    <div class="grid md:grid-cols-3 gap-4">
      <div class="card p-6 rounded-xl"><p class="text-slate-400">Your Subjects</p><p class="text-2xl font-800">${t.subjects.length}</p></div>
      <div class="card p-6 rounded-xl"><p class="text-slate-400">Total Learners</p><p class="text-2xl font-800">${t.subjects.reduce((s,subj)=>s+DB.learners.filter(l=>l.grade===subj.grade).length,0)}</p></div>
      <div class="card p-6 rounded-xl"><p class="text-slate-400">Tasks Overdue</p><p class="text-2xl font-800 text-red-400">${DB.tasks.filter(x=>x.teacher===CURRENT_TEACHER&&x.status==='late').length}</p></div>
    </div>
    <div class="card p-6 rounded-xl mt-4"><h3 class="font-800 mb-2">Your Classes</h3>${t.subjects.map(s=>`<div class="card p-3 mb-2">${s.subject} - ${s.grade}</div>`).join('')}</div>`;
}

function renderMyClass(){
  const t=DB.teachers.find(x=>x.code===CURRENT_TEACHER);
  const sel=document.getElementById('classFilter');
  if(!sel.options.length){sel.innerHTML=t.subjects.map(s=>`<option value="${s.grade}|${s.subject}">${s.subject} - ${s.grade}</option>`).join('');}
  const [grade,subject]=sel.value.split('|');
  const learners=DB.learners.filter(l=>l.grade===grade);
  const marks=DB.marks.filter(m=>m.subject===subject&&learners.some(l=>l.id===m.learnerId));
  const avg=marks.length?Math.round(marks.reduce((a,b)=>a+b.mark,0)/marks.length):0;
  const atRisk=marks.filter(m=>m.mark<50).length;
  const att=DB.attendance[grade]||{};

  document.getElementById('classStats').innerHTML=`
    <div class="card p-3"><p class="text-xs text-slate-400">Learners</p><p class="text-xl font-800">${learners.length}</p></div>
    <div class="card p-3"><p class="text-xs text-slate-400">Class Avg</p><p class="text-xl font-800">${avg}%</p></div>
    <div class="card p-3"><p class="text-xs text-slate-400">At Risk <50%</p><p class="text-xl font-800 text-red-400">${atRisk}</p></div>
    <div class="card p-3"><p class="text-xs text-slate-400">Attendance Today</p><p class="text-xl font-800">${Object.keys(att).length?Math.round(Object.values(att).filter(x=>x==='P').length/Object.keys(att).length*100):0}%</p></div>`;

  let rows=`<thead><tr class="text-left text-slate-400 border-b"><th>#</th><th>Learner</th><th>Mark %</th>${ATTENDANCE_MODE?'<th>Attendance</th>':''}</tr></thead><tbody>`;
  learners.forEach((l,i)=>{
    const mark=marks.find(m=>m.learnerId===l.id)?.mark||'';
    const attStatus=att[l.id]||'P';
    rows+=`<tr class="border-b">
      <td>${i+1}</td><td>${l.name}</td>
      <td><input type="number" id="mark_${l.id}" value="${mark}" class="w-20 bg-slate-800 p-1 rounded" min="0" max="100"></td>
      ${ATTENDANCE_MODE?`<td><button onclick="setAtt('${grade}','${l.id}','P')" class="px-2 py-1 rounded text-xs ${attStatus==='P'?'present':''}">P</button>
      <button onclick="setAtt('${grade}','${l.id}','A')" class="px-2 py-1 rounded text-xs ${attStatus==='A'?'absent':''}">A</button>
      <button onclick="setAtt('${grade}','${l.id}','L')" class="px-2 py-1 rounded text-xs ${attStatus==='L'?'late':''}">L</button></td>`:''}
    </tr>`;
  });
  rows+='</tbody>';document.getElementById('classTable').innerHTML=rows;
}

function saveAllMarks(){
  const [grade,subject]=document.getElementById('classFilter').value.split('|');
  const learners=DB.learners.filter(l=>l.grade===grade);
  learners.forEach(l=>{
    const val=document.getElementById(`mark_${l.id}`).value;
    if(val!==''){
      DB.marks=DB.marks.filter(m=>!(m.learnerId===l.id&&m.subject===subject));
      DB.marks.push({learnerId:l.id,subject,mark:+val,term:'T3'});
    }
  });
  saveDB();alert('Marks Saved!');renderMyClass();
}

function toggleAttendanceMode(){ATTENDANCE_MODE=!ATTENDANCE_MODE;renderMyClass();}
function setAtt(grade,id,status){if(!DB.attendance[grade])DB.attendance[grade]={};DB.attendance[grade][id]=status;saveDB();renderMyClass();}

function renderAll(){/* Admin tabs same as v2.0 */}

// Stubs for other functions
function addStudent(){}function addStaff(){}function uploadDoc(){}function addTask(){}function addFee(){}function exportDBE(){}
toggleRoleFields();
</script>
</body>
</html>
